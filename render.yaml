databases:
  - name: ofi-db
    databaseName: ofi_production
    user: ofi_user
    plan: free
    region: oregon
    postgresMajorVersion: 15

services:
  - type: web
    name: ofi-backend
    runtime: docker
    plan: free
    rootDir: backend
    healthCheckPath: /up
    autoDeploy: true

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_KEY
        generateValue: true

      # Render's `host` property returns just the hostname (no scheme).
      # APP_URL must be a full URL, so we hardcode the https:// scheme.
      - key: APP_URL
        value: https://ofi-backend.onrender.com

      - key: FRONTEND_URL
        value: https://ofi-frontend.onrender.com

      - key: DB_CONNECTION
        value: pgsql

      - key: DB_HOST
        fromDatabase:
          name: ofi-db
          property: host

      - key: DB_PORT
        fromDatabase:
          name: ofi-db
          property: port

      - key: DB_DATABASE
        fromDatabase:
          name: ofi-db
          property: database

      - key: DB_USERNAME
        fromDatabase:
          name: ofi-db
          property: user

      - key: DB_PASSWORD
        fromDatabase:
          name: ofi-db
          property: password

      - key: DB_SSLMODE
        value: require

      - key: CACHE_DRIVER
        value: file

      - key: QUEUE_CONNECTION
        value: database

      - key: SESSION_DRIVER
        value: cookie

      - key: FILESYSTEM_DISK
        value: local

      - key: JWT_SECRET
        sync: false

      - key: VAPID_PUBLIC_KEY
        sync: false

      - key: VAPID_PRIVATE_KEY
        sync: false

      - key: VAPID_SUBJECT
        value: mailto:admin@olam.com

  - type: web
    name: ofi-frontend
    runtime: static
    rootDir: frontend

    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true

    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://ofi-backend.onrender.com

      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
